# NATS Server Configuration for MCR Context Plane
# See https://docs.nats.io/running-a-nats-service/configuration for full options

# Server identification
server_name: mcr_context_plane

# Client connections
port: 4222
host: 0.0.0.0

# HTTP monitoring (optional, useful for debugging)
http_port: 8222

# JetStream configuration (required for MCR)
jetstream {
    # Storage directory for persistent streams
    store_dir: /var/lib/nats/jetstream
    
    # Memory limits
    max_memory_store: 1G
    
    # File storage limits
    max_file_store: 10G
}

# Logging
debug: false
trace: false
logtime: true

# Connection limits
max_connections: 1000
max_payload: 8MB

# Authentication (configure for production)
# For development/POC, authentication is disabled
# For production, use one of:
#   - Token authentication
#   - Username/password
#   - NKey authentication
#   - TLS client certificates
#
# Example token auth:
# authorization {
#     token: "your-secure-token-here"
# }
#
# Example user/password:
# authorization {
#     users = [
#         { user: "mcr_service", password: "secure-password" }
#     ]
# }
