# ADVulture Configuration
# Copy to config.yaml and edit before running.

# ── Active Directory LDAP ──────────────────────────────────────────────
ldap:
  server: "ldaps://dc01.corp.local"
  port: 636
  use_ssl: true
  username: "CORP\\advulture_svc"
  password: "CHANGE_ME"
  domain: "corp.local"
  base_dn: "DC=corp,DC=local"
  page_size: 1000

# ── Event Log Collection ───────────────────────────────────────────────
logs:
  # Option 1: offline EVTX files
  evtx_paths:
    - "/path/to/security.evtx"
    - "/path/to/system.evtx"
    - "/path/to/sysmon.evtx"
  # Option 2: live WinRM collection (leave evtx_paths empty)
  winrm_hosts:
    - "dc01.corp.local"
    - "dc02.corp.local"
  winrm_username: "CORP\\advulture_svc"
  winrm_password: "CHANGE_ME"
  # Collection windows
  authn_window_days: 30
  authz_window_days: 90

# ── Entra ID / Azure AD ────────────────────────────────────────────────
entra:
  enabled: false
  tenant_id: "xxxxxxxx-xxxx-xxxx-xxxx-xxxxxxxxxxxx"
  client_id: "xxxxxxxx-xxxx-xxxx-xxxx-xxxxxxxxxxxx"
  client_secret: "CHANGE_ME"

# ── ADFS Federation ───────────────────────────────────────────────────
adfs:
  enabled: false
  server_hosts:
    - "adfs01.corp.local"

# ── ML Configuration ──────────────────────────────────────────────────
ml:
  gnn_hidden_dim: 128
  gnn_num_layers: 3
  markov_iterations: 150
  markov_convergence: 1.0e-9

# ── Output ────────────────────────────────────────────────────────────
db_path: "advulture.duckdb"
report_dir: "reports"
log_level: "INFO"
