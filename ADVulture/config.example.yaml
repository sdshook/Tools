#
# ┌─────────────────────────────────────────────────────────────────────┐
# │  THIS CONFIG FILE IS OPTIONAL                                        │
# │                                                                       │
# │  For interactive use, just run:                                       │
# │    advulture analyze --ad-only                    # On-prem AD only   │
# │    advulture analyze --entra-only                 # Entra ID only     │
# │    advulture analyze --ad-auth kerberos --entra-auth device_code      │
# │                                          # Hybrid (AD + Entra ID)     │
# │                                                                       │
# │  Use this config file only for AUTOMATION with stored credentials.   │
# └─────────────────────────────────────────────────────────────────────┘

# ── On-Premises Active Directory ──────────────────────────────────────
ldap:
  # Leave empty for auto-discovery (recommended for interactive use)
  server: ""                      # e.g., "ldaps://dc01.corp.local"
  domain: ""                      # e.g., "corp.local" (auto-discovered)
  base_dn: ""                     # e.g., "DC=corp,DC=local" (derived from domain)
  port: 636
  use_ssl: true
  
  # Authentication mode:
  #   prompt   - Prompt for credentials at runtime (default, recommended)
  #   kerberos - Use current Kerberos ticket (domain-joined machine)
  #   ntlm     - NTLM authentication
  #   simple   - Simple LDAP bind with credentials below (automation only)
  auth_mode: "prompt"
  
  # Only needed for auth_mode: simple (automation)
  username: ""                    # e.g., "CORP\\svc_advulture"
  password: ""

# ── Event Log Collection ──────────────────────────────────────────────
logs:
  # EVTX files for offline/forensic analysis
  evtx_paths: []
  # Collection windows
  authn_window_days: 30
  authz_window_days: 90

# ── Entra ID / Azure AD ───────────────────────────────────────────────
entra:
  enabled: false
  
  # Authentication mode:
  #   device_code      - Interactive device code flow (default, no app reg needed)
  #   interactive      - Interactive browser popup (no app reg needed)
  #   client_secret    - App registration with secret (automation)
  #   certificate      - App registration with certificate (secure automation)
  #   managed_identity - Azure Managed Identity (Azure-hosted only)
  auth_mode: "device_code"
  
  # Only needed for automation (client_secret, certificate, managed_identity)
  tenant_id: ""
  client_id: ""
  client_secret: ""
  certificate_path: ""

# ── ADFS Federation ───────────────────────────────────────────────────
adfs:
  enabled: false
  server_hosts: []

# ── ML Configuration ──────────────────────────────────────────────────
ml:
  gnn_hidden_dim: 128
  gnn_num_layers: 3
  markov_iterations: 150
  markov_convergence: 1.0e-9

# ── Output ────────────────────────────────────────────────────────────
db_path: "advulture.duckdb"
report_dir: "reports"
log_level: "INFO"
